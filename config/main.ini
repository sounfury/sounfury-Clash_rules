custom_proxy_group=⚡ 自动选择`url-test`(?i)^(?=.*(🇭🇰|香港|HK|Hong\s*Kong|🇺🇲|🇺🇸|美国|US|United.?States|洛杉矶|圣何塞|🇸🇬|新加坡|狮城|SG|Singapore|🇯🇵|日本|东京|JP|Japan|🇹🇼|台湾|TW|Tai|Taiwan))(?!.*(实验|低倍率|小鸡|chicken|vps|剩余|Expire|Traffic|GB|官网|网址|官址|套餐|应急|失联|重置|到期|过期|订阅)).*`http://www.gstatic.com/generate_204`300,5,50
# 低倍率节点命名不统一，兼容“实验/低倍/0.x/折扣”等常见写法。
custom_proxy_group=🏷️ 低倍率`url-test`(?i)(实验|低倍率|低倍|0\.[1-9]\s*(?:x|倍)?|[1-5]折)`https://www.gstatic.com/generate_204`300,5,50
custom_proxy_group=🐔 小鸡节点`url-test`(?i)chicken|vps|server|小鸡|鸡`http://www.gstatic.com/generate_204`300,5,50

