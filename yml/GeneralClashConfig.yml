dns:
  enable: true # 是否启用dns false
  ipv6: true
  use-hosts: true
  prefer-h3: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip # 模式：redir-host或fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: # fake ip 白名单列表，如果你不知道这个参数的作用，请勿修改
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
  # 仅用于解析下方 DNS 上游自己的域名，例如 dns.alidns.com / dns.cloudflare.com
  # 不直接负责普通网站域名或代理节点 server 域名的解析
  default-nameserver:
    - https://223.5.5.5/dns-query
  # 普通网站/App 域名的默认解析器
  # 未命中 nameserver-policy 的普通域名，会先走这里
  nameserver:
    - https://dns.alidns.com/dns-query
  # 代理节点的 server 域名单独解析，避免受普通域名 fallback 逻辑影响
  # 例如订阅节点里的 server: sh-cloud1.233netboom.com 会优先走这里
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # 普通域名解析的备用上游
  # 当 nameserver 的结果命中 fallback-filter 条件时，会改用这里的结果
  fallback:
    - https://dns.cloudflare.com/dns-query
  # fallback 触发条件说明：
  # 1. geosite 命中 gfw 的域名，直接视为应由 fallback 处理
  # 2. nameserver 返回的 IP 若不是 geoip-code 指定的国家/地区，这里会认为结果可疑并改用 fallback
  # 3. nameserver 返回的 IP 若落入 ipcidr 指定网段，也会改用 fallback
  fallback-filter:
    geoip: true # 默认
    geoip-code: CN
    geosite:
      - gfw
    ipcidr: # 在这个网段内的 IP 地址会被考虑为被污染的 IP
      - 240.0.0.0/4
  # 普通域名的定向解析规则，优先级高于 nameserver / fallback
  # 这里只影响普通域名，不影响代理节点里的 server 域名；后者由 proxy-server-nameserver 负责
  nameserver-policy:
    geosite:cn,private,apple: https://dns.alidns.com/dns-query
    geosite:!cn,gfw: https://posvdm.cloudflare-gateway.com/dns-query



hosts:
  'iosapps.itunes.apple.com': hls.itunes.apple.com.mwcname.com
